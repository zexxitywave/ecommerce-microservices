server:
  port: 8092

spring:
  application:
    name: logging-service

  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/logging_db

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: logging-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hacisimsek.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        max.poll.interval.ms: 300000
    listener:
      ack-mode: record

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  logging:
    retention-days: 30
    error-alert-threshold: 10
    topics: service-logs,order-events,payment-events,inventory-events,shipping-events

logging:
  level:
    com.hacisimsek.logging: DEBUG
