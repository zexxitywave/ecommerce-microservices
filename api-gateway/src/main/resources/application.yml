server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # ── Auth Service (public — no JWT filter) ──────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        # ── Protected Services (JWT filter applied) ────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - JwtAuthFilter

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - JwtAuthFilter

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthFilter

        - id: shipping-service
          uri: lb://shipping-service
          predicates:
            - Path=/api/shipping/**
          filters:
            - JwtAuthFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthFilter

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - JwtAuthFilter

        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            - JwtAuthFilter

        - id: wishlist-service
          uri: lb://wishlist-service
          predicates:
            - Path=/api/wishlist/**
          filters:
            - JwtAuthFilter

        - id: seller-service
          uri: lb://seller-service
          predicates:
            - Path=/api/seller/**
          filters:
            - JwtAuthFilter

        - id: seller-admin
          uri: lb://seller-service
          predicates:
            - Path=/api/admin/sellers/**
          filters:
            - JwtAuthFilter

        - id: logging-service
          uri: lb://logging-service
          predicates:
            - Path=/api/logs/**
          filters:
            - JwtAuthFilter

app:
  jwt:
    secret: ${JWT_SECRET:22a0de5355c2b9acf34fff4392a5e9439f59d26f1f0fba6012629bc0290a576c}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
