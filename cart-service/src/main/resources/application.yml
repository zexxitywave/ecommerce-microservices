server:
  port: 8089

spring:
  application:
    name: cart-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  cart:
    ttl-seconds: 604800

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.hacisimsek.cart: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

info:
  app:
    name: cart-service
    version: 1.0.0