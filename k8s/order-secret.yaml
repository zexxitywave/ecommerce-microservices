apiVersion: v1
kind: Secret

metadata:
  name: order-service-secret

# Opaque = generic key/value secret (base64-encoded)
type: Opaque

# ── IMPORTANT ─────────────────────────────────────────────────────────────
# Values must be base64-encoded. Encode with:
#   Windows PowerShell : [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("yourvalue"))
#   Linux/Mac          : echo -n "yourvalue" | base64
#
# DO NOT commit real credentials. Replace these placeholders before deploying.
# Add this file to .gitignore or use Sealed Secrets / Vault in production.
# ──────────────────────────────────────────────────────────────────────────

data:
  # "postgres" in base64
  DB_USER: cG9zdGdyZXM=

  # "postgres" in base64 — replace with your real password
  DB_PASSWORD: cG9zdGdyZXM=

  # JWT secret (hex string) — must match the value used by api-gateway
  # Replace with your actual JWT_SECRET base64-encoded value
  JWT_SECRET: MjJhMGRlNTM1NWMyYjlhY2YzNGZmZjQzOTJhNWU5NDM5ZjU5ZDI2ZjFmMGZiYTYwMTI2MjliYzAyOTBhNTc2Yw==
