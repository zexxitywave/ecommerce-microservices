apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8051

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s