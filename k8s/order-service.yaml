# ── ClusterIP (internal pod-to-pod) ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      protocol: TCP
      port: 8051
      targetPort: 8051
  type: ClusterIP

---

# ── NodePort (external access / JMeter / curl) ───────────────────────────
# Access via http://localhost:30081 on Docker Desktop
apiVersion: v1
kind: Service
metadata:
  name: order-service-nodeport
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      protocol: TCP
      port: 8051
      targetPort: 8051
      nodePort: 30081
  type: NodePort
